services:
  orthanc:
    image: jodogne/orthanc-plugins:1.12.8
    ports:
      - "8042:8042"
      - "4242:4242"
    environment:
      ORTHANC__NAME: "Orthanc"
      ORTHANC__AUTHENTICATION_ENABLED: "false"
      ORTHANC__DICOM_WEB__ENABLE: "true"
      ORTHANC__DICOM_WEB__ROOT: "/dicom-web/"

  fhir:
    image: hapiproject/hapi:latest
    ports:
      - "8080:8080"
